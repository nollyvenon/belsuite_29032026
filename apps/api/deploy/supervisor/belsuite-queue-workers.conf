autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/belsuite/apps/api/storage/logs/worker-video.log
stopwaitsecs=7200

[program:belsuite-queue-campaigns]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/belsuite/apps/api/artisan queue:work failover_redis --sleep=1 --rest=1 --queue=campaigns --tries=5 --timeout=500 --max-time=3600 --memory=256
