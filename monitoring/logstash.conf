input {
  # Docker logs via JSON file driver
  file {
    path => "/var/lib/docker/containers/*/*.log"
    codec => json
    tags => ["docker"]
    stat_interval => 1
    start_position => "beginning"
  }

  # Application logs on TCP port
  tcp {
    port => 5000
    codec => json
    tags => ["application"]
  }

  # Nginx logs
  file {
    path => "/var/log/nginx/access.log"
    codec => plain
    tags => ["nginx"]
    start_position => "beginning"
  }

  # PostgreSQL logs
  file {
    path => "/var/log/postgresql/postgresql.log"
    codec => multiline {
      pattern => "^%{TIMESTAMP_ISO8601}"
      negate => true
      what => "previous"
    }
    tags => ["postgres"]
    start_position => "beginning"
  }

  # Redis logs
  file {
    path => "/var/log/redis/redis.log"
    codec => plain
    tags => ["redis"]
    start_position => "beginning"
  }
}

filter {
  # Parse JSON logs
  if [type] == "json" {
    json {
      source => "message"
    }
  }

  # Parse Nginx logs
  if "nginx" in [tags] {
    grok {
      match => {
        "message" => "%{COMBINEDAPACHELOG}"
      }
    }
    date {
      match => [ "timestamp", "dd/MMM/yyyy:HH:mm:ss Z" ]
    }
  }

  # Parse application logs
  if "application" in [tags] {
    grok {
      match => {
        "message" => "\[%{TIMESTAMP_ISO8601:timestamp}\] \[%{LOGLEVEL:level}\] %{GREEDYDATA:message}"
      }
    }
    mutate {
      convert => { "response_time" => "integer" }
      convert => { "bytes_sent" => "integer" }
    }
  }

  # Parse PostgreSQL logs
  if "postgres" in [tags] {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:timestamp} %{TZ} \[%{NUMBER:pid}\] %{WORD:log_level}:%{GREEDYDATA:pg_message}"
      }
    }
  }

  # Add environment metadata
  mutate {
    add_field => {
      "environment" => "${LOG_ENV:production}"
      "service_name" => "belsuite"
      "cluster" => "${LOG_CLUSTER:primary}"
    }
  }

  # Handle errors
  if "_grokparsefailure" in [tags] {
    mutate {
      add_tag => [ "parse_error" ]
      add_field => { "original_message" => "%{message}" }
    }
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "belsuite-%{+YYYY.MM.dd}"
    document_type => "_doc"
  }

  # Also send to stdout for debugging
  if [@metadata][log_processed] != true {
    stdout {
      codec => rubydebug
    }
  }

  # Send errors to a separate index
  if "parse_error" in [tags] {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "belsuite-errors-%{+YYYY.MM.dd}"
      document_type => "_doc"
    }
  }
}
