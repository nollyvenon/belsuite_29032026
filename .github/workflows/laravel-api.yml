# Laravel API (apps/api) — Octane migration gate: tests + production caches.
# Runs when API code or this workflow changes (incremental validation).

name: Laravel API

on:
  push:
    paths:
      - 'apps/api/**'
      - '.github/workflows/laravel-api.yml'
  pull_request:
    paths:
      - 'apps/api/**'
      - '.github/workflows/laravel-api.yml'

defaults:
  run:
    working-directory: apps/api

jobs:
  validate:
    name: Tests and production caches
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, curl, pdo_sqlite, bcmath, intl
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: apps/api/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('apps/api/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Octane migration phase 1 (config + route cache + PHPUnit)
        run: composer run validate:octane-migration-phase1
