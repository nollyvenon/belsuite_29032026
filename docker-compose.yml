services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: belsuite-postgres
    environment:
      POSTGRES_USER: belsuite
      POSTGRES_PASSWORD: belsuite_dev_password_change_in_prod
      POSTGRES_DB: belsuite
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U belsuite"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - belsuite-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: belsuite-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - belsuite-network

  # Meilisearch (Full-text search)
  meilisearch:
    image: getmeili/meilisearch:v1.5
    container_name: belsuite-meilisearch
    ports:
      - "7700:7700"
    environment:
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - belsuite-network

  # Backend API (NestJS)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: belsuite-backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://belsuite:belsuite_dev_password_change_in_prod@postgres:5432/belsuite
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-key-min-32-characters-long-for-development
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./dist:/app/dist
    command: npm run dev
    networks:
      - belsuite-network

  # Frontend (Next.js)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: builder
    container_name: belsuite-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - backend
    volumes:
      - ./src/app:/app/src/app
      - ./src/components:/app/src/components
    networks:
      - belsuite-network

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:

networks:
  belsuite-network:
    driver: bridge
